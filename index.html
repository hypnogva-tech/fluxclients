<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FluxClients.ch</title>

  <script src="https://fast.wistia.net/player.js" async></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent: #e63946;
      --accent-dark: #c1121f;
      --radius: 14px;
    }

    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
      padding: 60px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .video-wrap {
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.35);
    }

    .video-thumb {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
      overflow: hidden;
    }

    .play-btn {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(0,0,0,0.35);
      transition: background 0.2s;
      cursor: pointer;
    }

    .play-btn:hover {
      background: rgba(0,0,0,0.5);
    }

    .play-circle {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(230,57,70,0.6);
      transition: transform 0.2s;
    }

    .play-btn:hover .play-circle {
      transform: scale(1.08);
    }

    .play-label {
      color: white;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .play-sub {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
    }

    #videoPlayer {
      position: absolute;
      inset: 0;
    }

    #videoPlayer iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="video-wrap">

      <div class="video-thumb">

        <div class="play-btn" id="videoOverlay" onclick="startVideo()">

          <div class="play-circle">
            <svg width="28" height="28" viewBox="0 0 24 24">
              <polygon points="7,4 21,12 7,20" fill="white"/>
            </svg>
          </div>

          <div class="play-label">
            Regarder la vidéo
          </div>

          <div class="play-sub">
            7 minutes · Gratuit
          </div>

        </div>

        <div id="videoPlayer">

          <div
            class="wistia_responsive_padding"
            style="padding:56.25% 0 0 0;position:relative;height:100%;"
          >

            <div
              class="wistia_responsive_wrapper"
              style="height:100%;left:0;position:absolute;top:0;width:100%;"
            >

              <iframe
                id="wistiaFrame"
                src="https://fast.wistia.net/embed/iframe/gr25cqtnhc?web_component=true&seo=true"
                title="Video"
                allow="autoplay; fullscreen"
                allowtransparency="true"
                frameborder="0"
                scrolling="no"
                class="wistia_embed"
                name="wistia_embed"
                width="100%"
                height="100%"
              ></iframe>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <script>
    function startVideo() {

      document.getElementById('videoOverlay').remove();

      const iframe = document.getElementById('wistiaFrame');

      iframe.src =
        'https://fast.wistia.net/embed/iframe/gr25cqtnhc?autoplay=1&web_component=true&seo=true';
    }
  </script>

</body>
</html>
